<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linkdout — شبكتك المهنية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
:root {
  --bg: #FBFAF7;
  --bg-card: #F5F0EB;
  --bg-card-hover: #EDE5DD;
  --terracotta: #C27B4F;
  --terracotta-light: #D4956A;
  --terracotta-bg: rgba(194,123,79,0.08);
  --navy: #1A1A2E;
  --gold: #E8B960;
  --gold-light: #F2D68B;
  --gold-bg: rgba(232,185,96,0.12);
  --text: #2D2520;
  --text-secondary: #7A6E64;
  --text-muted: #A8988A;
  --olive: #5B8C5A;
  --olive-bg: rgba(91,140,90,0.08);
  --radius-sm: 12px;
  --radius: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --shadow-sm: 0 1px 3px rgba(45,37,32,0.04), 0 1px 2px rgba(45,37,32,0.06);
  --shadow: 0 2px 8px rgba(45,37,32,0.05), 0 4px 16px rgba(45,37,32,0.04);
  --shadow-lg: 0 4px 20px rgba(45,37,32,0.06), 0 8px 32px rgba(45,37,32,0.05);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
html { font-size:16px; scroll-behavior:smooth }
body {
  font-family: 'Noto Naskh Arabic','Lora',serif;
  background: var(--bg);
  color: var(--text);
  line-height:1.7;
  min-height:100vh;
  overflow-x:hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(232,185,96,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 70%, rgba(194,123,79,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 90%, rgba(91,140,90,0.04) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}
h1,h2,h3,h4 { font-family: 'Amiri','Playfair Display',serif; font-weight:600; line-height:1.3 }
a { color:inherit; text-decoration:none }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--text-muted); border-radius:3px }

/* ── NAVBAR ── */
.navbar {
  position:sticky; top:0; z-index:100;
  background: rgba(251,250,247,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(194,123,79,0.1);
  padding:0 2rem;
  height:64px;
  display:flex; align-items:center; justify-content:space-between;
}
.nav-logo {
  font-family:'Amiri','Playfair Display',serif;
  font-size:1.6rem; font-weight:700;
  color:var(--terracotta);
  display:flex; align-items:center; gap:0.5rem;
  letter-spacing:-0.02em;
}
.nav-logo .dot { 
  width:8px; height:8px; background:var(--gold); border-radius:50%;
  box-shadow:0 0 12px rgba(232,185,96,0.5);
}
.nav-search {
  position:relative;
  flex:0 1 420px;
}
.nav-search input {
  width:100%; background:var(--bg-card); border:1.5px solid transparent;
  padding:0.6rem 1rem 0.6rem 2.7rem; border-radius:var(--radius);
  font-family:inherit; font-size:0.9rem; color:var(--text);
  transition:var(--transition);
}
.nav-search input:focus { outline:none; border-color:var(--terracotta); background:#fff }
.nav-search svg {
  position:absolute; left:0.9rem; top:50%; transform:translateY(-50%);
  color:var(--text-muted); width:18px; height:18px;
}
.nav-links { display:flex; align-items:center; gap:0.25rem }
.nav-link {
  position:relative;
  display:flex; flex-direction:column; align-items:center; gap:0.15rem;
  padding:0.5rem 0.8rem; border-radius:var(--radius-sm);
  font-size:0.7rem; color:var(--text-secondary); cursor:pointer;
  transition:var(--transition);
  border:none; background:none; font-family:inherit;
}
.nav-link svg { width:22px; height:22px }
.nav-link:hover { color:var(--terracotta); background:var(--terracotta-bg) }
.nav-link.active { color:var(--terracotta) }
.nav-link.active::after {
  content:''; position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; background:var(--terracotta); border-radius:50%;
}
.nav-badge {
  position:absolute; top:2px; right:4px;
  min-width:18px; height:18px; background:var(--terracotta); color:#fff;
  font-size:0.65rem; border-radius:9px; display:flex; align-items:center; justify-content:center;
  padding:0 5px;
}
.nav-avatar {
  width:36px; height:36px; border-radius:50%; object-fit:cover;
  border:2px solid var(--terracotta-light); cursor:pointer;
  transition:var(--transition);
}
.nav-avatar:hover { border-color:var(--gold); transform:scale(1.05) }

/* ── LAYOUT ── */
.app-layout {
  display:grid;
  grid-template-columns: 280px 1fr 300px;
  gap:1.5rem;
  max-width:1400px;
  margin:0 auto;
  padding:1.5rem 2rem;
  position:relative; z-index:1;
}
.sidebar-left, .sidebar-right {
  position:sticky; top:calc(64px + 1.5rem);
  align-self:start;
  display:flex; flex-direction:column; gap:1rem;
}
.main-content { display:flex; flex-direction:column; gap:1.25rem }

/* ── CARDS ── */
.card {
  background:var(--bg-card);
  border-radius:var(--radius);
  padding:1.4rem;
  box-shadow:var(--shadow-sm);
  transition:var(--transition);
  position:relative;
  overflow:hidden;
}
.card::after {
  content:''; position:absolute; top:0; left:0; right:0;
  height:100%; border-radius:var(--radius);
  background:radial-gradient(ellipse at top, rgba(255,255,255,0.4) 0%, transparent 60%);
  pointer-events:none; opacity:0; transition:var(--transition);
}
.card:hover { box-shadow:var(--shadow); transform:translateY(-1px) }
.card:hover::after { opacity:1 }
.card-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1rem; font-weight:600; font-size:0.95rem;
}
.card-header h3 { font-size:1rem; color:var(--text) }

/* ── PROFILE CARD ── */
.profile-card { text-align:center }
.profile-card .cover {
  height:80px; margin:-1.4rem -1.4rem 0;
  background:linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 40%, var(--gold) 100%);
  border-radius:var(--radius) var(--radius) 0 0;
  position:relative;
}
.profile-card .cover::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 30% 50%, rgba(255,255,255,0.2) 0%, transparent 60%);
  border-radius:var(--radius) var(--radius) 0 0;
}
.profile-card .avatar-wrap {
  position:relative; margin-top:-40px; margin-bottom:0.6rem;
}
.profile-card .avatar {
  width:80px; height:80px; border-radius:50%; object-fit:cover;
  border:4px solid var(--bg); box-shadow:var(--shadow);
}
.profile-card h3 { font-size:1.1rem; margin:0.3rem 0 0.1rem }
.profile-card .headline { color:var(--text-secondary); font-size:0.8rem; margin-bottom:0.6rem }
.profile-card .status-badge {
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.35rem 0.9rem; border-radius:20px;
  font-size:0.75rem; font-weight:500;
}
.status-badge.open { background:var(--olive-bg); color:var(--olive) }
.status-badge.learning { background:rgba(232,185,96,0.15); color:#B8842E }

.profile-stats {
  display:flex; justify-content:space-around;
  margin-top:1rem; padding-top:0.8rem;
  border-top:1px solid rgba(45,37,32,0.08);
}
.profile-stat { text-align:center }
.profile-stat .num { font-family:'Amiri','Playfair Display',serif; font-size:1rem; font-weight:700; color:var(--terracotta) }
.profile-stat .lbl { font-size:0.7rem; color:var(--text-muted) }

/* ── CIRCLES ── */
.circle-item {
  display:flex; align-items:center; gap:0.7rem;
  padding:0.5rem 0; cursor:pointer;
  border-radius:var(--radius-sm); padding:0.5rem 0.7rem;
  transition:var(--transition);
}
.circle-item:hover { background:var(--bg) }
.circle-dot {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.circle-dot.close { background:var(--terracotta) }
.circle-dot.learn { background:var(--gold) }
.circle-dot.professional { background:var(--navy) }
.circle-info { flex:1 }
.circle-name { font-size:0.85rem; font-weight:500 }
.circle-count { font-size:0.7rem; color:var(--text-muted) }

/* ── POST COMPOSER ── */
.composer {
  display:flex; align-items:center; gap:0.8rem;
  padding:0.9rem 1.2rem;
}
.composer-avatar {
  width:44px; height:44px; border-radius:50%; object-fit:cover; flex-shrink:0;
}
.composer-btn {
  flex:1; text-align:right; background:var(--bg); border:none;
  padding:0.7rem 1rem; border-radius:var(--radius);
  color:var(--text-muted); font-family:inherit; font-size:0.85rem;
  cursor:pointer; transition:var(--transition);
}
.composer-btn:hover { background:#fff; color:var(--text) }
.composer-actions { display:flex; gap:0.5rem; padding-top:0.8rem; border-top:1px solid rgba(45,37,32,0.06) }
.composer-action {
  display:flex; align-items:center; gap:0.4rem;
  padding:0.5rem 0.8rem; border-radius:var(--radius-sm);
  font-size:0.8rem; color:var(--text-secondary); cursor:pointer;
  transition:var(--transition); border:none; background:none; font-family:inherit;
}
.composer-action:hover { background:var(--bg); color:var(--terracotta) }
.composer-action svg { width:18px; height:18px }

/* ── POST ── */
.post { padding:1.2rem }
.post-top { display:flex; align-items:center; gap:0.7rem; margin-bottom:0.8rem }
.post-avatar {
  width:44px; height:44px; border-radius:50%; object-fit:cover;
}
.post-meta { flex:1 }
.post-author { font-weight:600; font-size:0.9rem }
.post-info { font-size:0.75rem; color:var(--text-muted) }
.post-body { margin-bottom:0.8rem; font-size:0.9rem; line-height:1.8 }
.post-tags { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.8rem }
.post-tag {
  padding:0.2rem 0.7rem; border-radius:12px;
  font-size:0.7rem; background:var(--terracotta-bg); color:var(--terracotta);
}
.post-image {
  width:100%; border-radius:var(--radius); margin-bottom:0.8rem;
  max-height:360px; object-fit:cover;
}
.post-actions {
  display:flex; gap:0.25rem; padding-top:0.7rem;
  border-top:1px solid rgba(45,37,32,0.06);
}
.post-action {
  display:flex; align-items:center; gap:0.35rem;
  padding:0.45rem 0.8rem; border-radius:var(--radius-sm);
  font-size:0.8rem; color:var(--text-secondary); cursor:pointer;
  transition:var(--transition); border:none; background:none; font-family:inherit;
}
.post-action:hover { background:var(--bg) }
.post-action.liked { color:var(--terracotta) }
.post-action.liked svg { fill:var(--terracotta) }
.post-action svg { width:18px; height:18px }

/* ── OPPORTUNITY CARD ── */
.opp-item {
  padding:0.7rem; border-radius:var(--radius-sm);
  cursor:pointer; transition:var(--transition);
  border:1px solid transparent;
}
.opp-item:hover { background:var(--bg); border-color:rgba(194,123,79,0.15) }
.opp-company { font-size:0.7rem; color:var(--text-muted) }
.opp-title { font-size:0.85rem; font-weight:500; margin:0.15rem 0 }
.opp-meta { font-size:0.7rem; color:var(--terracotta) }

/* ── SUGGESTED PEOPLE ── */
.suggest-item {
  display:flex; align-items:center; gap:0.6rem;
  padding:0.5rem 0;
}
.suggest-avatar {
  width:38px; height:38px; border-radius:50%; object-fit:cover;
}
.suggest-info { flex:1; min-width:0 }
.suggest-name { font-size:0.82rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.suggest-role { font-size:0.7rem; color:var(--text-muted) }
.suggest-connect {
  padding:0.3rem 0.8rem; border-radius:16px; font-size:0.72rem;
  background:transparent; border:1.5px solid var(--terracotta); color:var(--terracotta);
  cursor:pointer; transition:var(--transition); font-family:inherit;
  white-space:nowrap;
}
.suggest-connect:hover { background:var(--terracotta); color:#fff }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.55rem 1.2rem; border-radius:var(--radius);
  font-family:inherit; font-size:0.85rem; font-weight:500;
  cursor:pointer; transition:var(--transition); border:none;
}
.btn-primary { background:var(--terracotta); color:#fff }
.btn-primary:hover { background:#B06E43; box-shadow:0 4px 16px rgba(194,123,79,0.3); transform:translateY(-1px) }
.btn-outline { background:transparent; border:1.5px solid var(--terracotta); color:var(--terracotta) }
.btn-outline:hover { background:var(--terracotta-bg) }
.btn-ghost { background:transparent; color:var(--text-secondary) }
.btn-ghost:hover { background:var(--bg) }
.btn-gold { background:var(--gold); color:var(--navy) }
.btn-gold:hover { background:var(--gold-light) }

/* ── PAGE CONTENT ── */
.page { display:none }
.page.active { display:block }

/* ── PROFILE PAGE ── */
.profile-page .cover-photo {
  width:100%; height:240px; object-fit:cover;
  border-radius:var(--radius-lg);
  background:linear-gradient(135deg, var(--navy) 0%, #2D3560 40%, var(--terracotta) 100%);
}
.profile-page .profile-header {
  display:flex; align-items:flex-end; gap:1.5rem;
  margin-top:-60px; padding:0 1.5rem;
}
.profile-page .profile-avatar {
  width:140px; height:140px; border-radius:50%; object-fit:cover;
  border:6px solid var(--bg); box-shadow:var(--shadow-lg);
}
.profile-page .profile-info { padding-bottom:0.5rem }
.profile-page .profile-name { font-size:1.8rem }
.profile-page .profile-headline { color:var(--text-secondary) }
.profile-page .profile-location { font-size:0.8rem; color:var(--text-muted); margin-top:0.2rem }
.profile-section { margin-top:1.5rem }
.profile-section h3 {
  font-size:1.15rem; margin-bottom:1rem;
  padding-bottom:0.5rem; border-bottom:2px solid var(--terracotta-bg);
}
.exp-item {
  display:flex; gap:1rem; padding:1rem;
  border-radius:var(--radius); transition:var(--transition);
}
.exp-item:hover { background:var(--bg-card) }
.exp-icon {
  width:48px; height:48px; border-radius:var(--radius-sm);
  background:var(--terracotta-bg); display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; flex-shrink:0;
}
.exp-info { flex:1 }
.exp-role { font-weight:600 }
.exp-company { color:var(--text-secondary); font-size:0.85rem }
.exp-duration { font-size:0.75rem; color:var(--text-muted) }
.exp-desc { font-size:0.85rem; color:var(--text-secondary); margin-top:0.3rem }

.skill-tag {
  display:inline-block; padding:0.4rem 1rem; margin:0.25rem;
  border-radius:20px; font-size:0.8rem; background:var(--bg-card);
  border:1px solid rgba(194,123,79,0.15); transition:var(--transition);
}
.skill-tag:hover { background:var(--terracotta-bg); border-color:var(--terracotta) }
.skill-tag.top { background:rgba(232,185,96,0.15); border-color:var(--gold); color:#8B6914 }

/* ── GROUPS PAGE ── */
.groups-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1.5rem;
}
.groups-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:1rem;
}
.group-card {
  background:var(--bg-card); border-radius:var(--radius);
  overflow:hidden; box-shadow:var(--shadow-sm); cursor:pointer;
  transition:var(--transition);
}
.group-card:hover { box-shadow:var(--shadow); transform:translateY(-2px) }
.group-cover {
  height:100px; background:linear-gradient(135deg, var(--navy) 0%, var(--terracotta) 100%);
  position:relative;
}
.group-cover.pattern-1 { background:linear-gradient(135deg, #2D3560, #C27B4F) }
.group-cover.pattern-2 { background:linear-gradient(135deg, #5B8C5A, #8CB369) }
.group-cover.pattern-3 { background:linear-gradient(135deg, #B8842E, #E8B960) }
.group-cover.pattern-4 { background:linear-gradient(135deg, #8B4513, #C27B4F) }
.group-avatar {
  width:64px; height:64px; border-radius:var(--radius); object-fit:cover;
  background:var(--bg); position:absolute; bottom:-20px; right:1rem;
  border:3px solid var(--bg); box-shadow:var(--shadow-sm);
  display:flex; align-items:center; justify-content:center;
  font-size:1.5rem;
}
.group-body { padding:1.5rem 1rem 1rem }
.group-name { font-weight:600; font-size:0.95rem }
.group-desc { font-size:0.78rem; color:var(--text-muted); margin:0.3rem 0 0.6rem }
.group-stats { display:flex; gap:1rem; font-size:0.72rem; color:var(--text-secondary) }
.group-stats span { display:flex; align-items:center; gap:0.2rem }

/* ── PAGES (COMPANIES) ── */
.pages-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1.5rem;
}
.pages-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:1rem;
}
.page-card {
  background:var(--bg-card); border-radius:var(--radius);
  overflow:hidden; box-shadow:var(--shadow-sm); cursor:pointer;
  transition:var(--transition);
}
.page-card:hover { box-shadow:var(--shadow); transform:translateY(-2px) }
.page-cover {
  height:90px;
  position:relative;
}
.page-cover.c1 { background:linear-gradient(135deg, #1a1a2e, #2D3560) }
.page-cover.c2 { background:linear-gradient(135deg, #5B8C5A, #3D6B3C) }
.page-cover.c3 { background:linear-gradient(135deg, #8B4513, #B06E43) }
.page-cover.c4 { background:linear-gradient(135deg, #B8842E, #D4A843) }
.page-cover.c5 { background:linear-gradient(135deg, #4A2C5E, #7B4E93) }
.page-cover.c6 { background:linear-gradient(135deg, #1A3A4A, #2E6B8A) }
.page-logo {
  width:52px; height:52px; border-radius:var(--radius-sm); object-fit:cover;
  background:var(--bg); position:absolute; bottom:-18px; right:1rem;
  border:3px solid var(--bg); box-shadow:var(--shadow-sm);
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; font-weight:700; color:var(--terracotta);
}
.page-body { padding:1.5rem 1rem 1rem }
.page-name { font-weight:600; font-size:0.95rem }
.page-industry { font-size:0.75rem; color:var(--text-muted); margin:0.15rem 0 0.5rem }
.page-jobs {
  display:inline-flex; align-items:center; gap:0.3rem;
  font-size:0.75rem; color:var(--terracotta); font-weight:500;
}

/* ── MESSAGES ── */
.messages-layout {
  display:grid; grid-template-columns:320px 1fr;
  gap:1rem; height:calc(100vh - 64px - 3rem);
}
.conversations-list {
  background:var(--bg-card); border-radius:var(--radius);
  overflow:hidden; box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column;
}
.conv-header {
  padding:1.2rem 1.5rem; font-weight:600;
  border-bottom:1px solid rgba(45,37,32,0.06);
}
.conv-item {
  display:flex; align-items:center; gap:0.7rem;
  padding:0.8rem 1.2rem; cursor:pointer;
  transition:var(--transition);
}
.conv-item:hover { background:var(--bg) }
.conv-item.active { background:var(--terracotta-bg); border-right:3px solid var(--terracotta) }
.conv-avatar {
  width:44px; height:44px; border-radius:50%; object-fit:cover; flex-shrink:0;
}
.conv-info { flex:1; min-width:0 }
.conv-name { font-size:0.85rem; font-weight:500 }
.conv-last { font-size:0.72rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.conv-time { font-size:0.68rem; color:var(--text-muted); flex-shrink:0 }
.chat-area {
  background:var(--bg-card); border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column;
}
.chat-header {
  padding:1rem 1.5rem; border-bottom:1px solid rgba(45,37,32,0.06);
  display:flex; align-items:center; gap:0.7rem;
}
.chat-messages {
  flex:1; padding:1.5rem; overflow-y:auto;
  display:flex; flex-direction:column; gap:1rem;
}
.msg {
  max-width:70%; padding:0.7rem 1rem; border-radius:var(--radius);
  font-size:0.85rem; line-height:1.6;
}

// ── API CONFIG ──
const API_BASE = 'http://localhost:5078/api';
let authState = { token: null, user: null };

// Load auth from localStorage
try {
  const saved = localStorage.getItem('linkdout_auth');
  if (saved) authState = JSON.parse(saved);
} catch(e) {}

function saveAuth() {
  localStorage.setItem('linkdout_auth', JSON.stringify(authState));
}

async function apiFetch(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (authState.token) headers['Authorization'] = `Bearer ${authState.token}`;
  
  const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
  if (res.status === 401) { logout(); throw new Error('انتهت الجلسة'); }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'حدث خطأ');
  }
  return res.json();
}

function logout() {
  authState = { token: null, user: null };
  localStorage.removeItem('linkdout_auth');
  switchToAuth();
}

function showAuthTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('authFormLogin').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('authFormRegister').style.display = tab === 'register' ? '' : 'none';
  const errLogin = document.getElementById('authErrorLogin');
  const errReg = document.getElementById('authErrorReg');
  if (errLogin) errLogin.style.display = 'none';
  if (errReg) errReg.style.display = 'none';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'جاري الدخول...';
  const errEl = document.getElementById('authErrorLogin');
  errEl.style.display = 'none';
  
  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: e.target.email.value, password: e.target.password.value })
    });
    authState = { token: data.token, user: data.user };
    saveAuth();
    switchToApp();
    switchPage('home');
    showToast('أهلاً بعودتك! 👋');
  } catch(err) {
    errEl.textContent = err.message || 'خطأ في تسجيل الدخول';
    errEl.style.display = '';
  } finally {
    btn.disabled = false; btn.textContent = 'دخول';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'جاري التسجيل...';
  const errEl = document.getElementById('authErrorReg');
  errEl.style.display = 'none';
  
  try {
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ fullName: e.target.fullName.value, email: e.target.email.value, password: e.target.password.value })
    });
    authState = { token: data.token, user: data.user };
    saveAuth();
    switchToApp();
    switchPage('home');
    showToast('أهلاً بيك في Linkdout! 🎉');
  } catch(err) {
    errEl.textContent = err.message || 'خطأ في التسجيل';
    errEl.style.display = '';
  } finally {
    btn.disabled = false; btn.textContent = 'إنشاء حساب';
  }
}

  return `<div style="text-align:center;padding:3rem;color:var(--text-muted)">
    <div style="width:40px;height:40px;border:3px solid var(--bg-card);border-top:3px solid var(--terracotta);border-radius:50%;margin:0 auto 1rem;animation:spin 0.8s linear infinite"></div>

const statusLabels = { open: '🔥 جاهز للتحدي', growing: '🌱 في مرحلة نمو', available: '🤝 متاح للتعاون', learning: '🧘 في رحلة تعلم' };
const statusClasses = { open: 'open', growing: 'learning', available: 'open', learning: 'learning' };
const avatarColors = ['#C27B4F','#5B8C5A','#1A1A2E','#E8B960','#8B4513','#2E6B8A','#7B4E93','#B06E43'];

function avatarHTML(user) {
  const initial = (user.fullName || '?')[0];
  const color = avatarColors[user.id % avatarColors.length];
  if (user.avatarUrl) return `<img src="${user.avatarUrl}" style="width:inherit;height:inherit;border-radius:50%;object-fit:cover">`;
  return `<div style="width:inherit;height:inherit;border-radius:50%;background:linear-gradient(135deg,${color},${avatarColors[(user.id+1)%avatarColors.length]});display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:Amiri,serif;font-size:inherit">${initial}</div>`;
}

  const main = document.getElementById('mainContent');

  main.innerHTML = `

    </div>
    <div class="search-filters animate-in" style="animation-delay:0.05s">
      <button class="filter-chip active">الكل</button>
      <button class="filter-chip">👤 أشخاص</button>

  `;
  sidebar.innerHTML = `<div class="card"><div class="card-header"><h3>🎯 فلترة</h3></div><div style="display:flex;flex-wrap:wrap;gap:0.3rem"><span class="skill-tag">القاهرة</span><span class="skill-tag">أسيوط</span><span class="skill-tag">عن بعد</span><span class="skill-tag">AI/ML</span><span class="skill-tag">Web Dev</span></div></div>`;

  document.getElementById('searchInput').focus();

async function performSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) return;
  const resultsDiv = document.getElementById('searchResults');
  resultsDiv.innerHTML = loadingHTML('جاري البحث...');

  try {
    const r = await apiFetch(`/search?q=${encodeURIComponent(q)}`);
    let html = '';
    if (r.people?.length) {
      html += `<div class="search-section-title">👤 أشخاص</div>`;
      r.people.forEach(p => {
        html += `<div class="search-result"><div class="search-result-avatar" style="background:${avatarColors[p.id%avatarColors.length]}">${(p.fullName||'?')[0]}</div><div class="search-result-info"><div class="search-result-name">${p.fullName}</div><div class="search-result-sub">${p.headline||''} · ${p.location||''}</div></div><span class="search-result-badge people">شخص</span></div>`;
      });
    }
    if (r.jobs?.length) {
      html += `<div class="search-section-title">💼 وظائف</div>`;
      r.jobs.forEach(j => {
        html += `<div class="search-result" onclick="switchPage('opportunities')"><div class="search-result-avatar" style="background:var(--gold)">💼</div><div class="search-result-info"><div class="search-result-name">${j.title}</div><div class="search-result-sub">${j.companyName} · ${j.type}</div></div><span class="search-result-badge job">وظيفة</span></div>`;
      });
    }
    if (r.groups?.length) {
      html += `<div class="search-section-title">👥 مجموعات</div>`;
      r.groups.forEach(g => {
        html += `<div class="search-result" onclick="viewGroupDetail(${g.id})"><div class="search-result-avatar" style="background:var(--olive)">${g.icon||'👥'}</div><div class="search-result-info"><div class="search-result-name">${g.name}</div><div class="search-result-sub">${g.memberCount} أعضاء</div></div><span class="search-result-badge group">مجموعة</span></div>`;
      });
    }
    if (r.companies?.length) {
      html += `<div class="search-section-title">🏢 شركات</div>`;
      r.companies.forEach(c => {
        html += `<div class="search-result" onclick="switchPage('pages')"><div class="search-result-avatar" style="background:var(--navy)">${c.name[0]}</div><div class="search-result-info"><div class="search-result-name">${c.name}</div><div class="search-result-sub">${c.industry||''}</div></div><span class="search-result-badge company">شركة</span></div>`;
      });
    }
    resultsDiv.innerHTML = html || '<div style="text-align:center;padding:3rem;color:var(--text-muted)">لا توجد نتائج</div>';
  } catch(err) {
    resultsDiv.innerHTML = `<div style="text-align:center;padding:2rem;color:#c0392b">⚠️ ${err.message}</div>`;
  }
}

// ── ACTIONS ──
async function toggleLikeAPI(btn, postId) {
  try {
    const data = await apiFetch(`/posts/${postId}/like`, { method: 'POST' });
    btn.classList.toggle('liked', data.isLiked);
    btn.querySelector('svg').setAttribute('fill', data.isLiked ? 'currentColor' : 'none');
    btn.querySelector('span').textContent = data.likeCount;
    if (data.isLiked) { btn.classList.add('like-pulse'); setTimeout(() => btn.classList.remove('like-pulse'), 400); }
  } catch(e) { showToast('⚠️ ' + e.message); }
}

async function connectUser(userId, btn) {
  try {
    await apiFetch(`/connections/request/${userId}`, { method: 'POST' });
    btn.textContent = 'تم الإرسال ✓';
    btn.disabled = true;
    btn.style.borderColor = 'var(--olive)';
    btn.style.color = 'var(--olive)';
    showToast('تم إرسال طلب التواصل! 🤝');
  } catch(e) { showToast('⚠️ ' + e.message); }
}

async function handleCreatePost() {
  const body = prompt('اكتب منشورك:');
  if (!body) return;
  try {
    await apiFetch('/posts', { method: 'POST', body: JSON.stringify({ body, tags: [] }) });
    showToast('تم نشر المنشور! 🎉');
    renderHome();
  } catch(e) { showToast('⚠️ ' + e.message); }
}

// ── UTILS ──
function timeAgo(dateStr) {
  const now = new Date();
  const date = new Date(dateStr);
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60) return 'الآن';
  if (diff < 3600) return `منذ ${Math.floor(diff/60)} دقيقة`;
  if (diff < 86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
  if (diff < 604800) return `منذ ${Math.floor(diff/86400)} يوم`;
  return date.toLocaleDateString('ar-EG');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── NAVIGATION ──
function switchPage(page, param) {
  if (!isLoggedIn() && page !== 'landing') { switchToAuth(); return; }

  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const navItem = document.querySelector(`[data-nav="${page}"]`);
  if (navItem) navItem.classList.add('active');

  const sidebarRight = document.getElementById('sidebarRight');
  const appLayout = document.querySelector('.app-layout');
  const sidebarLeft = document.querySelector('.sidebar-left');

  const showSidebars = () => { sidebarLeft.style.display = ''; sidebarRight.style.display = ''; appLayout.style.gridTemplateColumns = ''; };
  const hideLeft = () => { sidebarLeft.style.display = 'none'; sidebarRight.style.display = ''; appLayout.style.gridTemplateColumns = '1fr 300px'; };
  const hideBoth = () => { sidebarLeft.style.display = 'none'; sidebarRight.style.display = 'none'; appLayout.style.gridTemplateColumns = '1fr'; };

  switch(page) {
    case 'home': showSidebars(); renderHome(); break;
    case 'profile': showSidebars(); renderProfile(); break;
    case 'circles': showSidebars(); renderCircles(); break;
    case 'groups': hideLeft(); renderGroups(); break;
    case 'group-detail': hideLeft(); if (param) currentGroupId = param; renderGroupDetail(); break;
    case 'pages': hideLeft(); renderPages(); break;
    case 'company-detail': hideLeft(); renderCompanyDetail(); break;
    case 'opportunities': hideLeft(); renderOpportunities(); break;
    case 'search': hideLeft(); renderSearch(); break;
    case 'messages': hideBoth(); renderMessages(); break;
    case 'notifications': hideBoth(); renderNotifications(); break;
    case 'landing': hideBoth(); renderLanding(); break;
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── INIT ──
if (isLoggedIn()) {
  switchToApp();
  switchPage('home');
} else {
  switchToAuth();
}

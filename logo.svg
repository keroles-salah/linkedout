<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#2D2D44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C27B4F"/>
      <stop offset="100%" stop-color="#E8B960"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- L letterform -->
  <g transform="translate(256,256)">
    <!-- Vertical bar of L -->
    <rect x="-28" y="-90" width="56" height="180" rx="12" fill="url(#accent)"/>
    <!-- Horizontal bar of L -->
    <rect x="-28" y="50" width="100" height="40" rx="12" fill="url(#accent)"/>
  </g>

  <!-- Connection dots -->
  <circle cx="340" cy="310" r="10" fill="#C27B4F" opacity="0.8"/>
  <circle cx="380" cy="330" r="6" fill="#E8B960" opacity="0.6"/>
  <circle cx="370" cy="280" r="7" fill="#E8B960" opacity="0.5"/>

  <!-- Small connecting lines -->
  <line x1="340" y1="310" x2="380" y2="330" stroke="#C27B4F" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="340" y1="310" x2="370" y2="280" stroke="#C27B4F" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Brand text below -->
  <text x="256" y="420" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="38" font-weight="700" fill="#E8B960" letter-spacing="3">LINKDOUT</text>
</svg>
